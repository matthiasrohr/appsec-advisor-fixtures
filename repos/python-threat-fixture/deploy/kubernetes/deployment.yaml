apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-threat-fixture
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-threat-fixture
  template:
    metadata:
      labels:
        app: python-threat-fixture
    spec:
      hostNetwork: true
      containers:
        - name: app
          image: python-threat-fixture:latest
          env:
            - name: ADMIN_BOOTSTRAP_TOKEN
              value: py-admin-demo-token
            - name: JWT_SIGNING_KEY
              value: python-fixture-jwt-key-too-short
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            runAsUser: 0
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock

