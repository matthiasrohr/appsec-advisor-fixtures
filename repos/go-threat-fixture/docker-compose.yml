version: "3.8"

services:
  go-threat-fixture:
    build: .
    privileged: true
    ports:
      - "8082:8082"
    environment:
      ADMIN_BOOTSTRAP_TOKEN: go-admin-demo-token
      JWT_SIGNING_KEY: go-fixture-jwt-key-too-short
      PAYMENT_WEBHOOK_SECRET: inline-compose-secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runtime/uploads:/app/runtime/uploads

