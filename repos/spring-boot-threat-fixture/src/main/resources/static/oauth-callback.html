<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OAuth Callback</title>
</head>
<body>
<script>
const params = new URLSearchParams(window.location.hash.substring(1));
const token = params.get("access_token");
if (token) {
    localStorage.setItem("walletFixtureAccessToken", token);
    localStorage.setItem("walletFixtureOAuthState", params.get("state") || "");
}
window.location.replace("/");
</script>
</body>
</html>
