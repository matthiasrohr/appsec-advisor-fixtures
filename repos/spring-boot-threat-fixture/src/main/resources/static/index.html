<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wallet Fixture SPA</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="shell">
    <section class="panel">
        <h1>Wallet Fixture</h1>
        <p class="muted">Single-page client that talks directly to the API.</p>
        <div class="actions">
            <button id="password-login" type="button">Password login</button>
            <button id="oauth-login" type="button">OAuth implicit login</button>
            <button id="load-profile" type="button">Load profile</button>
            <button id="load-admin" type="button">Load admin summary</button>
        </div>
        <pre id="output">Ready.</pre>
    </section>
</main>
<script src="/app.js"></script>
</body>
</html>
