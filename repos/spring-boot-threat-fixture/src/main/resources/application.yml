spring:
  application:
    name: spring-boot-threat-fixture
  datasource:
    url: jdbc:h2:mem:fixturedb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  error:
    include-message: always
    include-stacktrace: always

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      enabled: true
    env:
      show-values: ALWAYS
    configprops:
      show-values: ALWAYS
    health:
      show-details: always

logging:
  file:
    name: runtime/logs/wallet-fixture.log
  level:
    com.example.threatfixture: DEBUG

app:
  admin-bootstrap-token: adm1n-demo-token-please-change
  jwt-signing-key: fixture-jwt-signing-key-too-short
  oauth-client-id: wallet-spa
  oauth-allowed-redirect-pattern: "*"
  oauth-token-ttl-seconds: 86400
  upload-root: ./runtime/uploads
  partner-callback-timeout-ms: 2500
  callback-allow-private-networks: true
